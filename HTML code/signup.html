<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnowledgeHub | Sign Up</title>
    <link rel="stylesheet" href="../CSS code/signup.css">
</head>

<body>

<header>
    <h1>KnowledgeHub</h1>
    <p>Create your account and start learning 🚀</p>
</header>

<div class="container">
    <div class="card">

        <h2>Sign Up</h2>

        <form action="index.html" onsubmit="return validatePassword()">
            
            <input type="text" id="firstName" placeholder="First Name" required>

            <input type="text" id="lastName" placeholder="Last Name" required>

            <input type="email" id="email" placeholder="Email Address" required>

            <input type="password" id="password" placeholder="Create Password" required>

            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

            <button>Create Account</button>
        </form>

        <div class="text">
            Already have an account?
            <a href="index.html">Login</a>
        </div>

    </div>
</div>

<footer>
    © 2026 KnowledgeHub. All Rights Reserved.
</footer>

<script>
function validatePassword() {
    const firstName = document.getElementById("firstName").value;
    const lastName = document.getElementById("lastName").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return false;
    }

    const user = {
        firstName: firstName,
        lastName: lastName,
        email: email,
        password: password
    };

    localStorage.setItem("userProfile", JSON.stringify(user));

    let count = localStorage.getItem("knowledgeHub_users") || 0;
    localStorage.setItem("knowledgeHub_users", parseInt(count) + 1);

    alert("Account Created Successfully!");
    return true;
}
</script>

</body>
</html>
