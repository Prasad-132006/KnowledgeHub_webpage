<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnowledgeHub | Sign Up</title>
    <link rel="stylesheet" href="../CSS code/signup.css">
</head>

<body>

<header>
    <h1>KnowledgeHub</h1>
    <p>Create your account and start learning 🚀</p>
</header>

<div class="container">
    <div class="card">
        <h2>Sign Up</h2>

        <form onsubmit="return validateSignup()">
            <input type="text" id="firstName" placeholder="First Name" required>
            <input type="text" id="lastName" placeholder="Last Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" pattern="(?=.*[A-Z])(?=.*[!@#$%^&*])[A-Za-z0-9!@#$%^&*]{8,}" placeholder="Password" required>
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

            <button type="submit">Create Account</button>
        </form>

        <div class="text">
            Already have an account?
            <a href="index.html">Login</a>
        </div>
    </div>
</div>

<footer>
    © 2026 KnowledgeHub. All Rights Reserved.
</footer>

<script>
function validateSignup() {
    const firstName = document.getElementById("firstName").value.trim();
    const lastName = document.getElementById("lastName").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return false;
    }

    const user = {
        firstName,
        lastName,
        email,
        password
    };

    localStorage.setItem("userProfile", JSON.stringify(user));
    localStorage.setItem("isLoggedIn", "true");

    alert("Account created successfully!");

    // 👉 better UX: go to dashboard directly
    window.location.href = "lecture.html";

    return false;
}
</script>

</body>
</html>
