<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>KnowledgeHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../CSS code/index.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css" />

    <style>
        #map {
            height: 250px;
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    <h1>KnowledgeHub</h1>
    <p>Your place to learn 🚀</p>
</header>

<div class="container">

    <form onsubmit="handleLogin(); return false;">
        <div class="card">
            <h2>Login</h2>
            <div id="auth-container">
                <input type="email" id="loginEmail" placeholder="Email address" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit">Login</button>
                <p>New user? <a href="signup.html">Sign up</a></p>
            </div>
        </div>
    </form>

    <div class="card">
        <h2>Total Users</h2>
        <p><span id="userCount">0</span></p>
    </div>

    <div class="card">
        <h2>Contact</h2>
        <div id="map"></div>
    </div>

</div>

<script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"></script>

<script>
    // MAP
    const map = L.map('map').setView([19.2083, 73.0110], 16);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    L.marker([19.2083, 73.0110]).addTo(map)
        .bindPopup("KnowledgeHub Location")
        .openPopup();

    // LOGIN
    function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const storedUser = JSON.parse(localStorage.getItem("userProfile"));

        if (storedUser && email === storedUser.email && password === storedUser.password) {
            localStorage.setItem("isLoggedIn", "true");
            window.location.href = "lecture.html";
        } else {
            alert("Invalid email or password.");
        }
    }

    function logout() {
        localStorage.removeItem("isLoggedIn");
        location.reload();
    }

    function joinLecture() {
        window.location.href = "lecture.html";
    }

    // ON LOAD
    window.onload = function () {
        const isLoggedIn = localStorage.getItem("isLoggedIn");
        const user = JSON.parse(localStorage.getItem("userProfile"));
        const authContainer = document.getElementById("auth-container");

        // user count
        document.getElementById("userCount").innerText =
            localStorage.getItem("knowledgeHub_users") || 0;

        // logged in UI
        if (isLoggedIn === "true" && user) {
            authContainer.innerHTML = `
                <h3>Welcome back, ${user.firstName}!</h3>
                <button onclick="joinLecture()">Join Lecture 🎥</button>
                <br><br>
                <button onclick="logout()" style="color:red;">Logout</button>
            `;
        }
    };
</script>

</body>
</html>
